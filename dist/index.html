<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>glowing-octo-barnacle</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(18rem, 24rem) minmax(0, 1fr);
        gap: 1rem 1.25rem;
        align-items: start;
      }

      .app-shell > h1,
      .app-shell > .app-intro {
        grid-column: 1 / -1;
      }

      .input-panel {
        border: 1px solid #808080;
        border-radius: 0.6rem;
        padding: 0.9rem;
        background: color-mix(in oklab, canvas 92%, black 8%);
      }

      .input-panel h2 {
        margin-top: 0;
        margin-bottom: 0.4rem;
      }

      textarea,
      pre {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9rem;
      }

      textarea {
        padding: 0.75rem;
        margin-top: 0.5rem;
        min-height: 9rem;
        max-height: 12rem;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem;
        margin: 0.85rem 0 0;
      }

      #copy-status {
        font-size: 0.85rem;
        color: #5f6f8a;
      }

      .animation-controls {
        margin: 0;
      }

      .animation-controls label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
      }

      .animation-controls select {
        min-width: 15rem;
        padding: 0.5rem 0.6rem;
        border-radius: 0.45rem;
      }

      .routine-description {
        margin-top: 0.65rem;
        color: #5f6f8a;
      }

      .workspace {
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(10rem, 0.8fr);
        gap: 0.85rem;
        min-height: 70vh;
      }

      .viewer-section,
      .workspace-output {
        margin: 0;
      }

      .workspace-output h3 {
        margin-top: 0;
        margin-bottom: 0.5rem;
      }

      #renderer-canvas {
        width: 100%;
        max-width: 100%;
        height: 100%;
        min-height: 20rem;
        border-radius: 0.6rem;
        border: 1px solid #5f6f8a;
        display: block;
        background: #0d1117;
      }

      button {
        padding: 0.6rem 1rem;
        cursor: pointer;
      }

      pre {
        padding: 1rem;
        border: 1px solid #808080;
        border-radius: 0.5rem;
        min-height: 12rem;
        height: 100%;
        overflow: auto;
      }

      @media (max-width: 900px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .workspace {
          min-height: auto;
          grid-template-rows: auto auto;
        }

        #renderer-canvas {
          height: auto;
          min-height: 14rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main>
        <h1>Renderer Input Runner</h1>
        <p>Loading app…</p>
        <p>
          If this stays blank, run <code>npm install</code> and <code>npm run build</code>, then open
          <code>dist/index.html</code>.
        </p>
      </main>
    </div>
    <script>
      (function loadRendererBundle() {
        const candidateBundleUrls = ['./bundle.js', './dist/bundle.js'].map((relativeUrl) =>
          new URL(relativeUrl, window.location.href).toString(),
        );

        function renderLoaderError(message, includeAttemptedUrls) {
          const appRoot = document.getElementById('app');
          if (!appRoot) {
            return;
          }

          const attempted = includeAttemptedUrls
            ? `<p>Attempted URLs:</p><ul>${candidateBundleUrls.map((url) => `<li><code>${url}</code></li>`).join('')}</ul>`
            : '';

          appRoot.innerHTML = `
            <main>
              <h1>Renderer Input Runner</h1>
              <p>${message}</p>
              ${attempted}
              <p>Run <code>npm install</code>, then <code>npm run build</code>.</p>
              <p>Also check DevTools Console for runtime errors.</p>
            </main>
          `;
        }

        window.addEventListener('error', function handleRuntimeError(event) {
          const message = event && event.message ? event.message : 'The app failed during startup.';
          renderLoaderError(`JavaScript runtime error: ${message}`, false);
        });

        function injectScript(index) {
          const bundleUrl = candidateBundleUrls[index];

          if (!bundleUrl) {
            renderLoaderError('Could not load the JavaScript bundle.', true);
            return;
          }

          const script = document.createElement('script');
          script.src = bundleUrl;
          script.defer = true;
          script.onerror = function loadNextBundleCandidate() {
            injectScript(index + 1);
          };
          document.body.appendChild(script);
        }

        injectScript(0);

        window.setTimeout(function verifyAppBooted() {
          const appRoot = document.getElementById('app');
          if (!appRoot) {
            return;
          }

          if (appRoot.textContent && appRoot.textContent.includes('Loading app')) {
            renderLoaderError('The bundle loaded but the app did not mount.', false);
          }
        }, 3500);
      })();
    </script>
  </body>
</html>
