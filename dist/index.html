<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>glowing-octo-barnacle</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      textarea,
      pre {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9rem;
      }

      textarea {
        padding: 0.75rem;
        margin-top: 0.5rem;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        margin: 1rem 0;
      }

      .viewer-section {
        margin: 1.25rem 0 1.5rem;
      }

      .animation-controls {
        margin: 1rem 0 0.25rem;
      }

      .animation-controls label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
      }

      .animation-controls select {
        min-width: 15rem;
        padding: 0.5rem 0.6rem;
        border-radius: 0.45rem;
      }

      .routine-description {
        margin-top: 0.65rem;
        color: #5f6f8a;
      }

      #renderer-canvas {
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: 0.6rem;
        border: 1px solid #5f6f8a;
        display: block;
        background: #0d1117;
      }

      button {
        padding: 0.6rem 1rem;
        cursor: pointer;
      }

      pre {
        padding: 1rem;
        border: 1px solid #808080;
        border-radius: 0.5rem;
        min-height: 14rem;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main>
        <h1>Renderer Input Runner</h1>
        <p>Loading app…</p>
        <p>
          If this stays blank, run <code>npm install</code> and <code>npm run build</code>, then open
          <code>dist/index.html</code>.
        </p>
      </main>
    </div>
    <script>
      (function loadRendererBundle() {
        const candidateBundleUrls = ['./bundle.js', './dist/bundle.js'].map((relativeUrl) =>
          new URL(relativeUrl, window.location.href).toString(),
        );

        function injectScript(index) {
          const bundleUrl = candidateBundleUrls[index];

          if (!bundleUrl) {
            const appRoot = document.getElementById('app');
            if (!appRoot) {
              return;
            }

            appRoot.innerHTML = `
              <main>
                <h1>Renderer Input Runner</h1>
                <p>Could not load the JavaScript bundle.</p>
                <p>Attempted URLs:</p>
                <ul>${candidateBundleUrls.map((url) => `<li><code>${url}</code></li>`).join('')}</ul>
                <p>Run <code>npm install</code>, then <code>npm run build</code>.</p>
              </main>
            `;
            return;
          }

          const script = document.createElement('script');
          script.src = bundleUrl;
          script.defer = true;
          script.onerror = function loadNextBundleCandidate() {
            injectScript(index + 1);
          };
          document.body.appendChild(script);
        }

        injectScript(0);
      })();
    </script>
  </body>
</html>
