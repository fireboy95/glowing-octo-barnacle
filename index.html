<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>glowing-octo-barnacle</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      textarea,

        width: 100%;

      }

      textarea {
        padding: 0.75rem;
        margin-top: 0.5rem;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        margin: 1rem 0;
      }

      button {
        padding: 0.6rem 1rem;
        cursor: pointer;
      }

      pre {
        padding: 1rem;
        border: 1px solid #808080;
        border-radius: 0.5rem;
        min-height: 14rem;
        overflow: auto;
      }
